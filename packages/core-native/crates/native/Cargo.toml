[package]
name = "native"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
name = "qt_binding"
crate-type = ["cdylib"]

[dependencies]
bytemuck = { version = "1.25.0", features = ["extern_crate_alloc"] }
cxx = "1.0.194"
fragment-derive = { version = "0.1.0", path = "../../macros/fragment-derive" }
motion = { version = "0.1.0", path = "../motion" }
napi = { version = "3.8.4", features = ["napi8"] }
napi-derive = "3.5.3"
once_cell = "1.21.4"
taffy = "0.10.1"
qt-compositor = { version = "0.1.0", path = "../qt-compositor" }
tokio = { version = "1.51.0", features = ["rt-multi-thread", "time"] }
vello = { version = "0.8.0" }
vello_cpu = "0.0.7"
vello_hybrid = { version = "0.0.7", features = ["std"] }
window-host = { version = "0.1.0", path = "../window-host" }
pollster = "0.4"
raw-window-handle = "0.6"
png = "0.18"
image = { version = "0.25.10", features = ["gif", "jpeg", "png", "webp"], default-features = false }
anyrender = "0.8.0"
anyrender_vello_hybrid = "0.3.0"
anyrender_vello_cpu = "0.10.0"
peniko = "0.6"
rustc-hash = "2.1.2"
vello_common = { version = "0.0.7", default-features = false }
raw-window-metal = "1.1.0"

[build-dependencies]
cc = "1.2.59"
cxx-build = "1.0.194"
napi-build = "2.3.1"
qt-build-utils = "0.8.1"

