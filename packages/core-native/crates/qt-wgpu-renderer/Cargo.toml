[package]
name = "qt-wgpu-renderer"
version = "0.1.0"
edition = "2024"

[dependencies]
ash = "0.38.0"
once_cell = "1.21.4"
wgpu = { version = "28.0.0", features = ["vulkan-portability"] }

[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33.0"

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.62.2", features = ["Win32_Foundation", "Win32_Graphics_Direct3D11", "Win32_Graphics_Direct3D12", "Win32_Graphics_Dxgi"] }
