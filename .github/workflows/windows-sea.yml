name: windows-sea

on:
  workflow_dispatch:
    inputs:
      tmate:
        description: "Pause job and open tmate session after toolchain setup"
        required: false
        default: false
        type: boolean
      example:
        description: "Which SEA example to package"
        required: false
        default: counter
        type: choice
        options:
          - counter
          - spin-triangle
          - all
      native_run_id:
        description: "Optional windows-native run id to download native artifacts from"
        required: false
        default: ""
        type: string
  workflow_run:
    workflows:
      - windows-native
    types:
      - completed

jobs:
  package:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-2022
    timeout-minutes: 150
    env:
      CARGO_TERM_COLOR: always
      QT_VERSION: 6.10.2
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: false
          env-vars: |
            RUSTC_WRAPPER
            SCCACHE_GHA_ENABLED

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools
          cache: true

      - name: Verify Qt tools
        shell: pwsh
        run: |
          qmake -query QT_VERSION
          where.exe qmake
          where.exe qsb
          where.exe windeployqt

      - name: Resolve SEA Node
        shell: pwsh
        run: |
          $seaNode = node .\scripts\ensure-sea-node.mjs
          $seaNodeHeadersDir = node .\scripts\ensure-sea-node.mjs headers-dir
          "QT_SOLID_SEA_PREP_NODE_BINARY=$seaNode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT_SOLID_SEA_NODE_BINARY=$seaNode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_nodedir=$seaNodeHeadersDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve Windows native artifact source
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_run") {
            $runId = "${{ github.event.workflow_run.id }}"
          } elseif ("${{ inputs.native_run_id }}" -ne "") {
            $runId = "${{ inputs.native_run_id }}"
          } else {
            throw "windows-sea requires a successful windows-native run; dispatch windows-native first or provide native_run_id"
          }
          if (-not $runId) {
            throw "Unable to resolve windows-native run id"
          }
          "WINDOWS_NATIVE_RUN_ID=$runId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download Windows native artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifactDir = Join-Path $PWD "_windows-native-artifact"
          Remove-Item $artifactDir -Recurse -Force -ErrorAction SilentlyContinue
          gh run download $env:WINDOWS_NATIVE_RUN_ID -n windows-native-x64 -D $artifactDir
          New-Item -ItemType Directory -Force -Path packages\core\native | Out-Null
          New-Item -ItemType Directory -Force -Path packages\example-widgets\native | Out-Null
          Copy-Item "$artifactDir\packages\core\native\*" packages\core\native\ -Recurse -Force
          Copy-Item "$artifactDir\packages\example-widgets\native\*" packages\example-widgets\native\ -Recurse -Force

      - name: Build counter SEA
        if: ${{ github.event_name == 'workflow_run' || inputs.example == 'counter' || inputs.example == 'all' }}
        run: node ./scripts/build-example-sea.mjs counter win32-x64

      - name: Build spin-triangle SEA
        if: ${{ github.event_name == 'workflow_run' || inputs.example == 'spin-triangle' || inputs.example == 'all' }}
        run: node ./scripts/build-example-sea.mjs spin-triangle win32-x64

      - name: Deploy Qt runtime for counter
        if: ${{ github.event_name == 'workflow_run' || inputs.example == 'counter' || inputs.example == 'all' }}
        shell: pwsh
        run: |
          $qtBinDir = qmake -query QT_INSTALL_BINS
          $qtWidgetsDll = Join-Path $qtBinDir "Qt6Widgets.dll"
          Copy-Item $qtWidgetsDll examples\counter\dist-sea\ -Force
          windeployqt --release --compiler-runtime --no-translations --dir examples\counter\dist-sea $qtWidgetsDll

      - name: Deploy Qt runtime for spin-triangle
        if: ${{ github.event_name == 'workflow_run' || inputs.example == 'spin-triangle' || inputs.example == 'all' }}
        shell: pwsh
        run: |
          $qtBinDir = qmake -query QT_INSTALL_BINS
          $qtWidgetsDll = Join-Path $qtBinDir "Qt6Widgets.dll"
          Copy-Item $qtWidgetsDll examples\spin-triangle\dist-sea\ -Force
          windeployqt --release --compiler-runtime --no-translations --dir examples\spin-triangle\dist-sea $qtWidgetsDll

      - name: Debug with tmate
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.tmate }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Record packaging metadata
        shell: pwsh
        run: |
          $sccacheStats = sccache --show-stats
          @(
            "Node: $(node --version)",
            "Bun: $(bun --version)",
            "Rust: $(rustc --version)",
            "Qt: $(qmake -query QT_VERSION)",
            "SEA Node: $env:QT_SOLID_SEA_NODE_BINARY",
            "sccache:"
          ) | Set-Content artifacts-windows-sea.txt
          $sccacheStats | Add-Content artifacts-windows-sea.txt

      - name: Upload counter SEA artifact
        if: ${{ github.event_name == 'workflow_run' || inputs.example == 'counter' || inputs.example == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-sea-counter-x64
          if-no-files-found: error
          path: |
            artifacts-windows-sea.txt
            examples/counter/dist-sea/**

      - name: Upload spin-triangle SEA artifact
        if: ${{ github.event_name == 'workflow_run' || inputs.example == 'spin-triangle' || inputs.example == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-sea-spin-triangle-x64
          if-no-files-found: error
          path: |
            artifacts-windows-sea.txt
            examples/spin-triangle/dist-sea/**
