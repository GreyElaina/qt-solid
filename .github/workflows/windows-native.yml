name: windows-native

on:
  workflow_dispatch:
    inputs:
      tmate:
        description: "Pause job and open tmate session after toolchain setup"
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - ".github/workflows/windows-native.yml"
      - "bun.lock"
      - "package.json"
      - "scripts/**"
      - "examples/**"
      - "packages/core/**"
      - "packages/core-widgets/**"
      - "packages/example-widgets/**"
      - "packages/core-native/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-native.yml"
      - "bun.lock"
      - "package.json"
      - "scripts/**"
      - "examples/**"
      - "packages/core/**"
      - "packages/core-widgets/**"
      - "packages/example-widgets/**"
      - "packages/core-native/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      QT_VERSION: 6.10.2
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-targets: false
          env-vars: |
            RUSTC_WRAPPER
            SCCACHE_GHA_ENABLED

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools
          cache: true

      - name: Verify Qt toolchain
        shell: pwsh
        run: |
          qmake -query QT_VERSION
          qmake -query QT_HOST_BINS
          where.exe qmake
          where.exe qsb

      - name: Resolve Node headers
        shell: pwsh
        run: |
          $seaNode = node .\scripts\ensure-sea-node.mjs
          $seaNodeHeadersDir = node .\scripts\ensure-sea-node.mjs headers-dir
          "QT_SOLID_SEA_PREP_NODE_BINARY=$seaNode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT_SOLID_SEA_NODE_BINARY=$seaNode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_nodedir=$seaNodeHeadersDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate bindings
        run: npm run generate:bindings

      - name: Build core native addon
        run: npm run build:native:release

      - name: Build example widgets native addon
        run: npm run build:native:example-widgets:release

      - name: Debug with tmate
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && inputs.tmate }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Record artifact manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $sccacheStats = sccache --show-stats
          @(
            "Node: $(node --version)",
            "Bun: $(bun --version)",
            "Rust: $(rustc --version)",
            "Qt: $(qmake -query QT_VERSION)",
            "sccache:"
          ) | Set-Content artifacts/build-metadata.txt
          $sccacheStats | Add-Content artifacts/build-metadata.txt

      - name: Upload Windows native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-x64
          if-no-files-found: error
          path: |
            artifacts/build-metadata.txt
            packages/core/native/**
            packages/example-widgets/native/**
