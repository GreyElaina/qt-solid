[package]
name = "qt-compositor-surface"
version = "0.1.0"
edition = "2024"

[dependencies]
bytemuck = { version = "1.25.0", features = ["derive"] }
once_cell = "1.21.4"
pollster = "0.4.0"
qt-compositor-core = { version = "0.1.0", path = "../qt-compositor-core" }
qt-compositor-gpu = { version = "0.1.0", path = "../qt-compositor-gpu" }
qt-compositor-types = { version = "0.1.0", path = "../qt-compositor-types" }
raw-window-handle = "0.6.2"
wgpu = { version = "28.0.0", features = ["vulkan-portability"] }
