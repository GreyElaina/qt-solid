[package]
name = "native"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
name = "qt_binding"
crate-type = ["cdylib"]

[dependencies]
bytemuck = { version = "1.25.0", features = ["extern_crate_alloc"] }
cxx = "1.0.194"
fragment-derive = { version = "0.1.0", path = "../../macros/fragment-derive" }
motion = { version = "0.1.0", path = "../motion" }
napi = { version = "3.8.6", features = ["napi8"] }
napi-derive = "3.5.5"
once_cell = "1.21.4"
taffy = "0.10.1"
tokio = { version = "1.52.1", features = ["rt-multi-thread", "time"] }
vello = { version = "0.8.0" }
vello_cpu = "0.0.7"
vello_hybrid = { version = "0.0.7", features = ["std"] }
pollster = "0.4"
raw-window-handle = "0.6"
png = "0.18"
image = { version = "0.25.10", features = ["gif", "jpeg", "png", "webp"], default-features = false }
anyrender = "0.8.0"
anyrender_vello_hybrid = "0.3.0"
anyrender_vello_cpu = "0.10.0"
peniko = "0.6"
rustc-hash = "2.1.2"
vello_common = { version = "0.0.7", default-features = false }
bitflags = "2"
qt-host = { version = "0.1.0", path = "../qt-host" }
accesskit = "0.24.0"
unicode-segmentation = "1.13.2"

[target.'cfg(target_os = "macos")'.dependencies]
accesskit_macos = "0.26.0"
objc2-app-kit = { version = "0.3.2", features = ["NSView", "NSWindow", "NSAccessibility"] }
objc2 = "0.6.4"
objc2-foundation = "0.3.2"
objc2-quartz-core = { version = "0.3.2", features = ["CADisplayLink", "CAFrameRateRange"] }
raw-window-metal = "1.1.0"
window-host = { version = "0.1.0", path = "../window-host" }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_Graphics_Dwm"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
drm = "0.15.0"

[features]
wayland = []
x11 = []

[build-dependencies]
cc = "1.2.61"
cxx-build = "1.0.194"
napi-build = "2.3.1"
qt-build-utils = "0.8.1"

