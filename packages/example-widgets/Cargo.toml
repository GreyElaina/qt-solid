[package]
name = "qt-solid-example-widgets"
version = "0.1.0"
edition = "2024"

[lib]
name = "qt_solid_example_widgets"
crate-type = ["cdylib", "rlib"]

[features]
qt-runtime = []

[dependencies]
napi = { version = "3.8.4", features = ["napi8"] }
napi-derive = "3.5.3"
qt-solid-example-widgets-schema = { version = "0.1.0", path = "crates/schema" }

[build-dependencies]
napi-build = "2.3.1"
qt-solid-example-widgets-schema = { version = "0.1.0", path = "crates/schema" }
widget-build = { version = "0.1.0", path = "../core-native/crates/widget-build" }
