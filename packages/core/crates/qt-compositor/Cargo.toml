[package]
name = "qt-compositor"
version = "0.1.0"
edition = "2024"

[features]
wayland = []
x11 = []

[dependencies]
bytemuck = { version = "1.25.0", features = ["derive"] }
once_cell = "1.21.4"
pollster = "0.4.0"
raw-window-handle = "0.6.2"
wgpu = { version = "28.0.0", features = ["vulkan-portability"] }

[target.'cfg(target_os = "macos")'.dependencies]
core-graphics-types = "0.2.0"
foreign-types = "0.5.0"
objc2 = "0.6.4"
objc2-core-foundation = "0.3.2"
objc2-foundation = "0.3.2"
objc2-metal = "0.3.2"
objc2-quartz-core = { version = "0.3.2", features = ["CAFrameRateRange"] }
raw-window-metal = "1.1.0"
wgpu-hal = "28.0.0"
window-host = { version = "0.1.0", path = "../window-host" }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_Graphics_Dwm"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
drm = "0.15.0"
